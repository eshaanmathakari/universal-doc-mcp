name: python

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run pytest tests/ -v

  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build
        run: |
          uv build
          uv tool run twine check dist/*

      - name: Verify install in clean env
        run: |
          uv venv /tmp/v
          uv pip install --python /tmp/v/bin/python dist/*.whl
          /tmp/v/bin/python -c "import scoutdocs_mcp; print(scoutdocs_mcp.__version__)"
          test -x /tmp/v/bin/scoutdocs-mcp

      - name: Validate README install commands match package name
        run: |
          set -e
          if ! grep -q "pip install scoutdocs-mcp\|--from scoutdocs-mcp" README.md; then
            echo "README.md must show install commands for 'scoutdocs-mcp'"
            exit 1
          fi
          if grep -q "pip install universal-docs-mcp\|--from universal-docs-mcp" README.md; then
            echo "README.md still references the old package name"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
